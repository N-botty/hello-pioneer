<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pioneer Tada</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding-bottom: 100px;
    }

    header {
      padding: 20px 20px 12px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 10;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    header span { font-size: 0.85rem; color: #666; }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid #1a1a1a;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: #f0f0f0;
      color: #0f0f0f;
      border-color: #f0f0f0;
      font-weight: 600;
    }

    /* Project list */
    #project-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }

    .project-card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 16px;
      border: 1px solid #252525;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .project-card:active { border-color: #444; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .project-name {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.3;
      flex: 1;
    }

    .priority-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .priority-dot.high { background: #ff4d4d; }
    .priority-dot.medium { background: #f5a623; }
    .priority-dot.low { background: #4caf50; }

    .project-desc {
      font-size: 0.85rem;
      color: #777;
      margin-top: 6px;
      line-height: 1.4;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }

    .status-badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status-badge.active { background: #1a3a2a; color: #4caf50; }
    .status-badge.paused { background: #2a2a1a; color: #f5a623; }
    .status-badge.completed { background: #1a1a2a; color: #7b8cde; }

    .note-count { font-size: 0.78rem; color: #555; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: #444; font-size: 0.95rem; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: #f0f0f0;
      color: #0f0f0f;
      font-size: 1.6rem;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 20;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.93); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 30;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: #555; }
    .form-group textarea { resize: none; height: 80px; }
    .form-group select option { background: #1a1a1a; }

    .row { display: flex; gap: 12px; }
    .row .form-group { flex: 1; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.7; }
    .btn-primary { background: #f0f0f0; color: #0f0f0f; }
    .btn-secondary { background: #2a2a2a; color: #aaa; }

    /* Detail view */
    #detail-view {
      display: none;
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      z-index: 25;
      overflow-y: auto;
    }
    #detail-view.open { display: block; }

    .detail-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: #0f0f0f;
    }

    .back-btn {
      background: #1a1a1a;
      border: none;
      color: #f0f0f0;
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detail-title { font-size: 1.1rem; font-weight: 700; flex: 1; }

    .detail-body { padding: 20px; }

    .detail-meta {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .detail-desc {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .section-title {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
      margin-bottom: 12px;
    }

    .note-item {
      background: #1a1a1a;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      color: #ccc;
    }

    .note-date { font-size: 0.75rem; color: #444; margin-top: 6px; }

    .add-note-area {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .add-note-area textarea {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 0.9rem;
      padding: 10px 12px;
      outline: none;
      font-family: inherit;
      resize: none;
      height: 60px;
    }

    .add-note-area button {
      background: #f0f0f0;
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      padding: 0 16px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .status-actions { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }

    .status-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .status-btn.current { border-color: #f0f0f0; color: #f0f0f0; font-weight: 600; }

    .loading { text-align: center; padding: 40px; color: #444; }
  </style>
</head>
<body>

<header>
  <h1>Pioneer Tada</h1>
  <span id="project-count"></span>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="active">Active</button>
  <button class="filter-btn" data-filter="paused">Paused</button>
  <button class="filter-btn" data-filter="completed">Completed</button>
  <button class="filter-btn" data-filter="high">High Priority</button>
</div>

<div id="project-list"><div class="loading">Loading...</div></div>

<button class="fab" id="add-btn">+</button>

<!-- Add Project Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>New Project</h2>
    <div class="form-group">
      <label>Project Name</label>
      <input type="text" id="new-name" placeholder="What are you building?" />
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="new-desc" placeholder="Brief overview or goal..."></textarea>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Priority</label>
        <select id="new-priority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="new-status">
          <option value="active" selected>Active</option>
          <option value="paused">Paused</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="save-btn">Add Project</button>
    </div>
  </div>
</div>

<!-- Detail View -->
<div id="detail-view">
  <div class="detail-header">
    <button class="back-btn" id="back-btn">&#8592;</button>
    <div class="detail-title" id="detail-title"></div>
  </div>
  <div class="detail-body">
    <div class="detail-meta" id="detail-meta"></div>
    <div class="detail-desc" id="detail-desc"></div>

    <div class="section-title">Status</div>
    <div class="status-actions" id="status-actions"></div>

    <div class="section-title" style="margin-top:28px;">Notes</div>
    <div id="notes-list"></div>
    <div class="add-note-area">
      <textarea id="note-input" placeholder="Add a note or variable to track..."></textarea>
      <button id="add-note-btn">Add</button>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://qiasqmssajpsukutnlna.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpYXNxbXNzYWpwc3VrdXRubG5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzE2NDcsImV4cCI6MjA5MjMwNzY0N30.urc-IHmSW7-a4Tplult9it1U_exWeRzDdku-HuYcY_4'
  )

  let projects = []
  let currentFilter = 'all'
  let currentProject = null

  // --- Load projects ---
  async function loadProjects() {
    const { data, error } = await supabase
      .from('projects')
      .select('*, project_notes(count)')
      .order('created_at', { ascending: false })

    if (error) { console.error(error); return; }
    projects = data
    renderProjects()
  }

  function renderProjects() {
    const list = document.getElementById('project-list')
    let filtered = projects

    if (currentFilter === 'high') filtered = projects.filter(p => p.priority === 'high')
    else if (currentFilter !== 'all') filtered = projects.filter(p => p.status === currentFilter)

    document.getElementById('project-count').textContent = `${filtered.length} project${filtered.length !== 1 ? 's' : ''}`

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">No projects yet. Tap + to add one.</div>'
      return
    }

    list.innerHTML = filtered.map(p => {
      const noteCount = p.project_notes?.[0]?.count ?? 0
      return `
        <div class="project-card" data-id="${p.id}">
          <div class="card-top">
            <div class="project-name">${p.name}</div>
            <div class="priority-dot ${p.priority}"></div>
          </div>
          ${p.description ? `<div class="project-desc">${p.description}</div>` : ''}
          <div class="card-bottom">
            <span class="status-badge ${p.status}">${p.status}</span>
            <span class="note-count">${noteCount > 0 ? `${noteCount} note${noteCount !== 1 ? 's' : ''}` : ''}</span>
          </div>
        </div>`
    }).join('')

    list.querySelectorAll('.project-card').forEach(card => {
      card.addEventListener('click', () => openDetail(card.dataset.id))
    })
  }

  // --- Detail view ---
  async function openDetail(id) {
    currentProject = projects.find(p => p.id === id)
    if (!currentProject) return

    document.getElementById('detail-title').textContent = currentProject.name
    document.getElementById('detail-desc').textContent = currentProject.description || ''
    document.getElementById('detail-meta').innerHTML = `
      <span class="status-badge ${currentProject.status}">${currentProject.status}</span>
      <span class="status-badge" style="background:#222;color:#aaa">${currentProject.priority} priority</span>
    `

    renderStatusActions()
    await loadNotes(id)
    document.getElementById('detail-view').classList.add('open')
  }

  function renderStatusActions() {
    const statuses = ['active', 'paused', 'completed']
    document.getElementById('status-actions').innerHTML = statuses.map(s => `
      <button class="status-btn ${currentProject.status === s ? 'current' : ''}" data-status="${s}">${s}</button>
    `).join('')

    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', () => updateStatus(btn.dataset.status))
    })
  }

  async function updateStatus(status) {
    const { error } = await supabase
      .from('projects')
      .update({ status, updated_at: new Date().toISOString() })
      .eq('id', currentProject.id)

    if (error) { console.error(error); return; }
    currentProject.status = status
    const proj = projects.find(p => p.id === currentProject.id)
    if (proj) proj.status = status
    renderStatusActions()
    document.getElementById('detail-meta').innerHTML = `
      <span class="status-badge ${status}">${status}</span>
      <span class="status-badge" style="background:#222;color:#aaa">${currentProject.priority} priority</span>
    `
    renderProjects()
  }

  // --- Notes ---
  async function loadNotes(projectId) {
    const { data, error } = await supabase
      .from('project_notes')
      .select('*')
      .eq('project_id', projectId)
      .order('created_at', { ascending: false })

    if (error) { console.error(error); return; }
    const list = document.getElementById('notes-list')
    if (data.length === 0) {
      list.innerHTML = '<div class="note-item" style="color:#444">No notes yet.</div>'
      return
    }
    list.innerHTML = data.map(n => `
      <div class="note-item">
        ${n.body}
        <div class="note-date">${new Date(n.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })}</div>
      </div>
    `).join('')
  }

  document.getElementById('add-note-btn').addEventListener('click', async () => {
    const body = document.getElementById('note-input').value.trim()
    if (!body || !currentProject) return

    const { error } = await supabase
      .from('project_notes')
      .insert({ project_id: currentProject.id, body })

    if (error) { console.error(error); return; }
    document.getElementById('note-input').value = ''
    await loadNotes(currentProject.id)
    await loadProjects()
  })

  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('detail-view').classList.remove('open')
    currentProject = null
  })

  // --- Add project modal ---
  document.getElementById('add-btn').addEventListener('click', () => {
    document.getElementById('add-modal').classList.add('open')
    document.getElementById('new-name').focus()
  })

  document.getElementById('cancel-btn').addEventListener('click', () => {
    document.getElementById('add-modal').classList.remove('open')
  })

  document.getElementById('save-btn').addEventListener('click', async () => {
    const name = document.getElementById('new-name').value.trim()
    if (!name) return

    const { error } = await supabase.from('projects').insert({
      name,
      description: document.getElementById('new-desc').value.trim() || null,
      priority: document.getElementById('new-priority').value,
      status: document.getElementById('new-status').value,
    })

    if (error) { console.error(error); return; }
    document.getElementById('new-name').value = ''
    document.getElementById('new-desc').value = ''
    document.getElementById('add-modal').classList.remove('open')
    await loadProjects()
  })

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      currentFilter = btn.dataset.filter
      renderProjects()
    })
  })

  // Close modal on overlay tap
  document.getElementById('add-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open')
  })

  loadProjects()
</script>
</body>
</html>
